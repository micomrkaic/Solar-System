<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Solar System</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Courier New', monospace;
    }

    /* ── outer wrapper centres the canvas and stacks the overlay ── */
    #wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%; height: 100%;
    }

    /* ── loading overlay ── */
    #loading {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #000;
      color: #aaa;
      font-size: 14px;
      z-index: 10;
      gap: 14px;
      transition: opacity 0.4s ease;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }

    #loading-title {
      color: #ffdc32;
      font-size: 20px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    #progress-wrap {
      width: 280px; height: 4px;
      background: #1a1a2e;
      border-radius: 2px;
      overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #5080ff, #80c0ff);
      border-radius: 2px;
      transition: width 0.15s linear;
    }

    #status-text { color: #666; font-size: 12px; }

    /* ── the SDL2 canvas ── */
    canvas#canvas {
      display: block;
      /* Keep pixel-perfect rendering – no browser smoothing */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Scale to fit the iframe while keeping aspect ratio */
      max-width: 100%;
      max-height: 100%;
    }
  </style>
</head>
<body>
<div id="wrapper">
  <div id="loading">
    <div id="loading-title">3D Solar System</div>
    <div id="progress-wrap"><div id="progress-fill"></div></div>
    <div id="status-text">Initialising…</div>
  </div>

  <!--
    SDL2/Emscripten renders into this canvas.
    The id MUST be "canvas" (Emscripten's default lookup).
  -->
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
</div>

<script>
  var loadingEl   = document.getElementById('loading');
  var statusEl    = document.getElementById('status-text');
  var progressEl  = document.getElementById('progress-fill');
  var totalBytes  = 0;
  var loadedBytes = 0;

  // Called by Emscripten's glue code with status strings like
  // "Downloading data... (1/2)", "Running...", ""
  function setStatus(text) {
    if (!text) {
      // Empty string means everything is ready
      loadingEl.classList.add('hidden');
      setTimeout(function() { loadingEl.style.display = 'none'; }, 450);
      return;
    }
    statusEl.textContent = text;
  }

  var Module = {
    // Point SDL2 at our canvas
    canvas: (function() { return document.getElementById('canvas'); })(),

    // Forward print / error to browser console
    print:    function(t) { console.log(t);   },
    printErr: function(t) { console.warn(t);  },

    setStatus: setStatus,

    // Track download progress for the .data file (fonts, etc.)
    monitorRunDependencies: function(left) {
      // left counts pending deps; we just show a pulse while it's nonzero
      if (left === 0) setStatus('');
    },

    // Show download progress from the XHR progress events
    onCustomMessage: function(msg) { /* unused */ },
  };

  // Intercept Emscripten's XMLHttpRequest progress to animate the bar
  (function() {
    var origOpen = XMLHttpRequest.prototype.open;
    XMLHttpRequest.prototype.open = function() {
      this.addEventListener('progress', function(e) {
        if (e.lengthComputable) {
          totalBytes  += e.total;
          loadedBytes += e.loaded;
          var pct = totalBytes > 0
            ? Math.min(100, Math.round(loadedBytes / totalBytes * 100))
            : 0;
          progressEl.style.width = pct + '%';
          setStatus('Loading… ' + pct + '%');
        }
      });
      origOpen.apply(this, arguments);
    };
  })();

  // Show a friendly error if WASM fails to load
  window.addEventListener('error', function(e) {
    statusEl.textContent = 'Error: ' + (e.message || 'unknown');
    statusEl.style.color = '#f55';
  });
</script>

<!-- Generated by Emscripten.  Must be loaded AFTER Module is defined. -->
<script async src="solar_system.js"></script>
</body>
</html>
